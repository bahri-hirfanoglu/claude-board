<!DOCTYPE html>
<html style="background:#1f1b17"><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1f1b17;--bg2:#15120f;--card:#2a2520;--card2:#332d27;--border:#3d372e;--border2:#4d453b;--accent:#DA7756;--accent2:#e5936f;--glow:rgba(218,119,86,.18);--text:#ebe4d8;--text2:#d4cbbe;--muted:#918678;--dim:#564d40;--faint:#3d372e;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--r:12px;--rl:16px}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);height:100vh;overflow:hidden;color:var(--text)}
::selection{background:var(--accent);color:#fff}

/* ─── Splash ─── */
.splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
.splash.hide{opacity:0;pointer-events:none}
.splash .sl{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),#c4624a);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;animation:spulse 1.5s ease-in-out infinite}
.splash .sl svg{width:26px;height:26px}
.splash .st{color:var(--dim);font-size:12px;font-weight:500;letter-spacing:1px;margin-bottom:12px}
.splash .sd{display:flex;gap:5px}
.splash .sd i{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.25;animation:sdot .8s ease-in-out infinite}
.splash .sd i:nth-child(2){animation-delay:.15s}.splash .sd i:nth-child(3){animation-delay:.3s}
@keyframes spulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(218,119,86,0)}50%{transform:scale(1.06);box-shadow:0 0 30px rgba(218,119,86,.25)}}
@keyframes sdot{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}

/* ─── Layout ─── */
.wiz{height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient i{position:absolute;border-radius:50%;background:var(--accent);opacity:0;animation:amb 14s ease-in-out infinite}
@keyframes amb{0%,100%{opacity:0;transform:translateY(0) scale(.3)}30%{opacity:.04}50%{opacity:.06;transform:translateY(-80px) scale(1)}70%{opacity:.02}}

.drag{height:32px;-webkit-app-region:drag;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;padding:0 10px;position:relative;z-index:2}
.drag .x{-webkit-app-region:no-drag;background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 10px;border-radius:8px;font-size:13px;transition:.2s}
.drag .x:hover{background:rgba(255,255,255,.05);color:var(--muted)}

.pbar{padding:0 32px;flex-shrink:0;z-index:2;position:relative}
.pt{height:3px;background:var(--faint);border-radius:4px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.snav{display:flex;justify-content:center;gap:5px;padding:10px 0 0;z-index:2;position:relative}
.sn{width:6px;height:6px;border-radius:50%;background:var(--faint);transition:all .4s}
.sn.done{background:var(--accent)}.sn.on{background:var(--accent);width:18px;border-radius:3px;box-shadow:0 0 8px var(--glow)}

/* ─── Steps ─── */
.steps{flex:1;position:relative;overflow:hidden;z-index:1}
.step{position:absolute;inset:0;padding:16px 34px 12px;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateX(40px);transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .35s}
.step.active{opacity:1;pointer-events:auto;transform:translateX(0)!important}
.step.left{transform:translateX(-40px)}.step.right{transform:translateX(40px)}
.step-scroll{flex:1;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--faint) transparent}
.step-scroll::-webkit-scrollbar{width:4px}.step-scroll::-webkit-scrollbar-thumb{background:var(--faint);border-radius:4px}

h2{font-size:18px;font-weight:700;letter-spacing:-.2px;color:var(--text);margin-bottom:4px}
.sub{color:var(--muted);font-size:12.5px;line-height:1.65;margin-bottom:14px}

/* ─── Logo row ─── */
.lr{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.lo{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#c4624a);border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(218,119,86,.18);flex-shrink:0;animation:logo-glow 3s ease-in-out infinite alternate}
@keyframes logo-glow{0%{box-shadow:0 6px 20px rgba(218,119,86,.12)}100%{box-shadow:0 8px 32px rgba(218,119,86,.25)}}
.lo svg{width:24px;height:24px}
.li h1{font-size:21px;margin:0}.li .v{color:var(--dim);font-size:10.5px;font-weight:500;margin-top:1px}

/* ─── Lang ─── */
.lgr{display:flex;gap:8px;margin-bottom:12px}
.lg{flex:1;padding:12px 10px;background:var(--card);border:2px solid var(--border);border-radius:var(--rl);cursor:pointer;text-align:center;transition:all .3s;color:var(--text2);font-size:12.5px;font-weight:600;position:relative;overflow:hidden}
.lg::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glow),transparent);opacity:0;transition:.3s}
.lg:hover{border-color:var(--border2)}.lg:hover::before{opacity:.5}
.lg.on{border-color:var(--accent);background:rgba(218,119,86,.04)}.lg.on::before{opacity:1}
.lg .fl{font-size:24px;display:block;margin-bottom:4px}

/* ─── Feature pills ─── */
.fps{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.fp{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:10.5px;color:var(--muted);font-weight:500;opacity:0;animation:fi .35s ease forwards}
.fp:nth-child(1){animation-delay:.1s}.fp:nth-child(2){animation-delay:.18s}.fp:nth-child(3){animation-delay:.26s}.fp:nth-child(4){animation-delay:.34s}.fp:nth-child(5){animation-delay:.42s}.fp:nth-child(6){animation-delay:.5s}
.fp i{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ─── Checks ─── */
.cks{display:flex;flex-direction:column;gap:8px;margin:4px 0 10px}
.ck{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);opacity:0;animation:fi .4s ease forwards;position:relative;overflow:hidden}
.ck:nth-child(1){animation-delay:.15s}.ck:nth-child(2){animation-delay:.4s}.ck:nth-child(3){animation-delay:.65s}
.ck::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;transition:background .3s}
.ck.pass::before{background:var(--green)}.ck.fail::before{background:var(--red)}
.ci{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;transition:.3s}
.ci.ok{background:rgba(34,197,94,.1);color:var(--green)}.ci.bad{background:rgba(239,68,68,.1);color:var(--red)}.ci.opt{background:rgba(145,134,120,.1);color:var(--dim)}.ck.warn::before{background:var(--dim)}
.ci.ld{background:rgba(218,119,86,.08)}.ci.ld::after{content:'';width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.cn{flex:1}.cn .nm{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:1px}.cn .dt{font-size:10.5px;color:var(--muted)}
.cn .fx{font-size:10.5px;color:var(--amber);margin-top:4px;padding:3px 8px;background:rgba(245,158,11,.06);border-radius:6px;display:inline-block}

/* ─── Form ─── */
label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.ir{display:flex;gap:8px;margin-bottom:5px}
input[type="text"],input[type="number"]{flex:1;padding:10px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12.5px;outline:none;transition:border .2s,box-shadow .2s;font-family:ui-monospace,'SF Mono',monospace}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
input::placeholder{color:var(--dim)}
.br{padding:10px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.br:hover{border-color:var(--accent);color:var(--accent);background:rgba(218,119,86,.04)}
.ht{font-size:10.5px;color:var(--dim);margin-bottom:14px;line-height:1.5}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pr input{width:80px;text-align:center}
.ps{font-size:10.5px;font-weight:500;display:flex;align-items:center;gap:4px}
.ps.ok{color:var(--green)}.ps.bad{color:var(--red)}
.ps::before{content:'';width:5px;height:5px;border-radius:50%}.ps.ok::before{background:var(--green)}.ps.bad::before{background:var(--red)}
.g{margin-bottom:12px}

/* ─── Collapse section ─── */
.col{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.col.open{border-color:var(--border2)}
.col-h{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .2s;user-select:none}
.col-h:hover{background:rgba(255,255,255,.02)}
.col-h .arr{color:var(--dim);font-size:10px;transition:transform .3s;flex-shrink:0}
.col.open .col-h .arr{transform:rotate(90deg)}
.col-h .ct{font-size:12.5px;font-weight:600;color:var(--text);flex:1}
.col-h .badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600}
.col-b{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s;padding:0 14px}
.col.open .col-b{max-height:300px;padding:0 14px 12px}

/* ─── Skip ─── */
.sk{color:var(--dim);font-size:11.5px;text-align:center;cursor:pointer;padding:8px;border-radius:var(--r);transition:.2s;border:1.5px dashed var(--border);background:none;width:100%;margin-top:4px}
.sk:hover{color:var(--muted);border-color:var(--dim);background:rgba(255,255,255,.015)}

/* ─── Summary ─── */
.sb{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.si{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);font-size:11.5px;opacity:0;animation:fi .3s ease forwards;position:relative;overflow:hidden}
.si::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.si:nth-child(1){animation-delay:.08s}.si:nth-child(2){animation-delay:.16s}.si:nth-child(3){animation-delay:.24s}.si:nth-child(4){animation-delay:.32s}.si:nth-child(5){animation-delay:.4s}.si:nth-child(6){animation-delay:.48s}
.si .sl{color:var(--muted);padding-left:8px}.si .sv{color:var(--text);font-weight:600;font-family:ui-monospace,monospace;font-size:10.5px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}

/* ─── Ready ─── */
.rdy{text-align:center;margin:8px 0 4px;opacity:0;animation:fi .5s ease .2s forwards}
.rdy .em{font-size:36px;display:block;margin-bottom:8px;animation:bounce 1.2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ─── Footer ─── */
.foot{display:flex;justify-content:space-between;align-items:center;padding:0 34px 18px;flex-shrink:0;z-index:2;position:relative}
.btn{padding:10px 22px;border-radius:var(--r);font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all .25s;position:relative;overflow:hidden}
.btn-b{background:none;color:var(--dim);padding:10px 12px}.btn-b:hover{color:var(--muted)}
.btn-n{background:linear-gradient(135deg,var(--accent),#c4624a);color:#fff;box-shadow:0 4px 14px rgba(218,119,86,.22);letter-spacing:.3px}
.btn-n::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,.12);border-radius:50%;transform:translate(-50%,-50%);transition:width .4s,height .4s}
.btn-n:hover::before{width:200px;height:200px}
.btn-n:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(218,119,86,.3)}
.btn-n:active{transform:translateY(0)}.btn-n:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:none}

/* ─── Toggle ─── */
.tog{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer}
.tog .tb{width:34px;height:18px;border-radius:9px;background:var(--faint);position:relative;transition:.3s;flex-shrink:0}
.tog .tb::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--dim);transition:.3s}
.tog.on .tb{background:var(--accent)}.tog.on .tb::after{left:18px;background:#fff}
.tog .tl{font-size:12px;color:var(--muted)}

/* ─── Confetti ─── */
.conf{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.conf span{position:absolute;border-radius:2px;opacity:0;animation:cfall 2s ease-out forwards}
@keyframes cfall{0%{opacity:1;transform:translateY(-30px) rotate(0) scale(0)}20%{opacity:1;transform:translateY(60px) rotate(100deg) scale(1)}100%{opacity:0;transform:translateY(500px) rotate(600deg) scale(.3)}}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
</style></head>
<body>

<div class="splash" id="splash"><div class="sl"><svg viewBox="0 0 512 512" fill="none"><path d="M256 72C256 72 272 188 276 212C280 236 324 256 440 256C324 256 280 276 276 300C272 324 256 440 256 440C256 440 240 324 236 300C232 276 188 256 72 256C188 256 232 236 236 212C240 188 256 72 256 72Z" fill="white" opacity=".95"/></svg></div><div class="st">CLAUDE BOARD</div><div class="sd"><i></i><i></i><i></i></div></div>

<div class="wiz">
<div class="ambient" id="amb"></div>
<div class="drag"><button class="x" onclick="quit()">✕</button></div>
<div class="pbar"><div class="pt"><div class="pf" id="pf" style="width:16.6%"></div></div></div>
<div class="snav" id="snav"></div>

<div class="steps">

<!-- ═══ 0: Welcome ═══ -->
<div class="step active" id="s0"><div class="step-scroll">
  <div class="lr"><div class="lo"><svg viewBox="0 0 512 512" fill="none"><path d="M256 72C256 72 272 188 276 212C280 236 324 256 440 256C324 256 280 276 276 300C272 324 256 440 256 440C256 440 240 324 236 300C232 276 188 256 72 256C188 256 232 236 236 212C240 188 256 72 256 72Z" fill="white" opacity=".95"/></svg></div><div class="li"><h1>Claude Board</h1><div class="v">Visual Task Orchestration</div></div></div>
  <div class="sub" id="t-wd"></div>
  <label id="t-ll"></label>
  <div class="lgr"><button class="lg on" onclick="setLang('en')" id="le"><span class="fl">🇬🇧</span>English</button><button class="lg" onclick="setLang('tr')" id="lt"><span class="fl">🇹🇷</span>Türkçe</button></div>
  <div class="fps">
    <div class="fp"><i style="background:var(--amber)"></i><span id="f1"></span></div>
    <div class="fp"><i style="background:var(--green)"></i><span id="f2"></span></div>
    <div class="fp"><i style="background:#a855f7"></i><span id="f3"></span></div>
    <div class="fp"><i style="background:#3b82f6"></i><span id="f4"></span></div>
    <div class="fp"><i style="background:var(--red)"></i><span id="f5"></span></div>
    <div class="fp"><i style="background:var(--accent)"></i><span id="f6"></span></div>
  </div>
</div></div>

<!-- ═══ 1: System Check ═══ -->
<div class="step right" id="s1"><div class="step-scroll">
  <h2 id="t-sc"></h2><div class="sub" id="t-sd"></div>
  <div class="cks">
    <div class="ck" id="c-claude"><div class="ci ld" id="i-claude"></div><div class="cn"><div class="nm">Claude CLI</div><div class="dt" id="d-claude"></div></div></div>
    <div class="ck" id="c-git"><div class="ci ld" id="i-git"></div><div class="cn"><div class="nm">Git</div><div class="dt" id="d-git"></div></div></div>
    <div class="ck" id="c-port"><div class="ci ld" id="i-port"></div><div class="cn"><div class="nm" id="t-pnm"></div><div class="dt" id="d-port"></div></div></div>
    <div class="ck" id="c-gh"><div class="ci ld" id="i-gh"></div><div class="cn"><div class="nm">GitHub CLI <span style="font-size:9px;font-weight:400;color:var(--dim)">(optional)</span></div><div class="dt" id="d-gh"></div></div></div>
  </div>
</div></div>

<!-- ═══ 2: Storage ═══ -->
<div class="step right" id="s2"><div class="step-scroll">
  <h2 id="t-dt"></h2><div class="sub" id="t-dd"></div>
  <div class="g"><label id="t-dl"></label><div class="ir"><input type="text" id="dataPath"/><button class="br" onclick="brD()" id="t-br"></button></div><div class="ht" id="t-dh"></div></div>
  <div class="g"><label id="t-pl"></label><div class="pr"><input type="number" id="portIn" value="4000" min="1024" max="65535"/><span class="ps" id="pSt"></span></div></div>
</div></div>

<!-- ═══ 3: Project ═══ -->
<div class="step right" id="s3"><div class="step-scroll">
  <h2 id="t-pt"></h2><div class="sub" id="t-pd"></div>

  <div class="g"><label id="t-nl"></label><input type="text" id="pName" placeholder="My App"/></div>
  <div class="g"><label id="t-wl"></label><div class="ir"><input type="text" id="pDir" placeholder="/path/to/code"/><button class="br" onclick="brP()" id="t-bp"></button></div></div>

  <!-- Collapsible details -->
  <div class="col" id="col-perm"><div class="col-h" onclick="togCol('col-perm')"><span class="arr">▸</span><span class="ct" id="t-perm"></span><span class="badge" style="background:rgba(34,197,94,.1);color:var(--green)" id="t-permB"></span></div><div class="col-b">
    <div class="tog on" onclick="togPerm(this)"><div class="tb"></div><div class="tl" id="t-permD"></div></div>
  </div></div>

  <div class="col" id="col-queue"><div class="col-h" onclick="togCol('col-queue')"><span class="arr">▸</span><span class="ct" id="t-queue"></span><span class="badge" style="background:rgba(245,158,11,.1);color:var(--amber)" id="t-queueB"></span></div><div class="col-b">
    <div class="tog" onclick="togQ(this)"><div class="tb"></div><div class="tl" id="t-queueD"></div></div>
    <div class="g" style="margin-top:8px"><label id="t-conc"></label><div class="pr"><input type="number" id="maxConc" value="1" min="1" max="10" style="width:60px"/></div></div>
  </div></div>

  <div class="col" id="col-git"><div class="col-h" onclick="togCol('col-git')"><span class="arr">▸</span><span class="ct" id="t-gitS"></span><span class="badge" style="background:rgba(59,130,246,.1);color:#3b82f6" id="t-gitB"></span></div><div class="col-b">
    <div class="tog on" onclick="togGit(this)"><div class="tb"></div><div class="tl" id="t-gitD"></div></div>
    <div class="g" style="margin-top:8px"><label id="t-base"></label><input type="text" id="baseBranch" value="main" style="width:120px"/></div>
  </div></div>

  <button class="sk" onclick="go(4)" id="t-sk"></button>
</div></div>

<!-- ═══ 4: Preferences ═══ -->
<div class="step right" id="s4"><div class="step-scroll">
  <h2 id="t-prefs"></h2><div class="sub" id="t-prefsD"></div>

  <div class="col open" id="col-model"><div class="col-h" onclick="togCol('col-model')"><span class="arr">▸</span><span class="ct" id="t-defModel"></span></div><div class="col-b">
    <div class="lgr" id="modelRow">
      <button class="lg on" onclick="setModel('sonnet',this)">Sonnet<div style="font-size:9px;color:var(--dim);margin-top:2px">Balanced</div></button>
      <button class="lg" onclick="setModel('opus',this)">Opus<div style="font-size:9px;color:var(--dim);margin-top:2px">Powerful</div></button>
      <button class="lg" onclick="setModel('haiku',this)">Haiku<div style="font-size:9px;color:var(--dim);margin-top:2px">Fast</div></button>
    </div>
  </div></div>

  <div class="col" id="col-notif"><div class="col-h" onclick="togCol('col-notif')"><span class="arr">▸</span><span class="ct" id="t-notif"></span></div><div class="col-b">
    <div class="tog on" id="tog-notif" onclick="this.classList.toggle('on')"><div class="tb"></div><div class="tl" id="t-notifD"></div></div>
  </div></div>
</div></div>

<!-- ═══ 5: Ready ═══ -->
<div class="step right" id="s5"><div class="step-scroll">
  <div class="rdy"><span class="em">🚀</span><h2 id="t-rt"></h2></div>
  <div class="sub" style="text-align:center" id="t-rd"></div>
  <div class="sb" id="sumBox"></div>
</div></div>

</div>

<div class="foot">
  <button class="btn btn-b" id="bB" onclick="prev()" style="visibility:hidden"></button>
  <button class="btn btn-n" id="bN" onclick="next()"><span id="nL"></span></button>
</div>
</div>
<div class="conf" id="conf"></div>

<script>
const invoke=window.__TAURI_INTERNALS__.invoke;
let cur=0,N=6,lang='en',sys=null,defModel='sonnet',autoQ=false,autoBr=true,autoPerm=true;

const T={en:{
  wd:'Orchestrate multiple AI agents to work on your codebase in parallel. Let\'s set up your workspace.',
  ll:'Language',sc:'System Check',sd:'Verifying required tools...',
  dt:'Data Storage',dd:'Choose where to store your database and files.',dl:'Data Directory',dh:'SQLite database and files stored here.',
  pl:'Server Port',br:'Browse',
  pt:'First Project',pd:'Set up your first project. Expand sections below to configure details.',
  nl:'Project Name',wl:'Working Directory',bp:'Browse',
  perm:'Permissions',permB:'Auto-accept',permD:'Auto-accept all tool permissions (recommended for trusted codebases)',
  queue:'Auto Queue',queueB:'Off',queueD:'Automatically start tasks from backlog when slots are available',
  conc:'Max Concurrent Agents',
  gitS:'Git Integration',gitB:'Auto-branch',gitD:'Create feature branches automatically for each task',base:'Base Branch',
  sk:'Skip — I\'ll create a project later',
  prefs:'Preferences',prefsD:'Default settings for new tasks. You can change these anytime.',
  defModel:'Default Model',notif:'Notifications',notifD:'Show desktop notifications for task events',
  rt:'You\'re All Set!',rd:'Here\'s your workspace configuration:',
  nxt:'Next →',bk:'← Back',fin:'Launch Claude Board ✦',su:'Launching...',
  pOk:'Available',pBad:'In use',cOk:'Installed',cBad:'Not found',gOk:'Installed',gBad:'Not found',
  cFx:'Install from claude.ai/download',gFx:'Install from git-scm.com',ghOk:'Authenticated',ghNo:'Not installed',ghNA:'Not authenticated — run: gh auth login',ghFx:'Install from cli.github.com (enables GitHub Issues sync)',chk:'Checking...',pnm:'Port 4000',
  sL:'Language',sD:'Data Directory',sP:'Port',sPr:'Project',sNo:'None',sMo:'Default Model',sPe:'Permissions',
  f1:'AI Orchestration',f2:'Auto Queue',f3:'Auto Testing',f4:'DAG Dependencies',f5:'Failed Retry',f6:'Webhooks',
},tr:{
  wd:'Birden fazla AI ajanını paralel çalıştırın. Çalışma alanınızı ayarlayalım.',
  ll:'Dil',sc:'Sistem Kontrolü',sd:'Gerekli araçlar kontrol ediliyor...',
  dt:'Veri Depolama',dd:'Veritabanı ve dosyalarınızı nerede saklayacağınızı seçin.',dl:'Veri Dizini',dh:'SQLite veritabanı ve dosyalar burada saklanacak.',
  pl:'Sunucu Portu',br:'Gözat',
  pt:'İlk Proje',pd:'İlk projenizi ayarlayın. Detaylar için bölümleri genişletin.',
  nl:'Proje Adı',wl:'Çalışma Dizini',bp:'Gözat',
  perm:'İzinler',permB:'Otomatik kabul',permD:'Tüm araç izinlerini otomatik kabul et (güvenilir kod tabanları için önerilir)',
  queue:'Otomatik Kuyruk',queueB:'Kapalı',queueD:'Boş slot olduğunda görevleri otomatik başlat',
  conc:'Maks Eşzamanlı Ajan',
  gitS:'Git Entegrasyonu',gitB:'Otomatik dal',gitD:'Her görev için otomatik feature branch oluştur',base:'Ana Dal',
  sk:'Atla — Projeyi sonra oluşturacağım',
  prefs:'Tercihler',prefsD:'Yeni görevler için varsayılan ayarlar. İstediğiniz zaman değiştirebilirsiniz.',
  defModel:'Varsayılan Model',notif:'Bildirimler',notifD:'Görev olayları için masaüstü bildirimleri göster',
  rt:'Hazırsınız!',rd:'Çalışma alanı yapılandırmanız:',
  nxt:'İleri →',bk:'← Geri',fin:'Claude Board\'u Başlat ✦',su:'Başlatılıyor...',
  pOk:'Kullanılabilir',pBad:'Kullanımda',cOk:'Yüklü',cBad:'Bulunamadı',gOk:'Yüklü',gBad:'Bulunamadı',
  cFx:'claude.ai/download adresinden yükleyin',gFx:'git-scm.com adresinden yükleyin',ghOk:'Kimlik doğrulandı',ghNo:'Yüklü değil',ghNA:'Kimlik doğrulanmadı — çalıştırın: gh auth login',ghFx:'cli.github.com adresinden yükleyin (GitHub Issues sync için)',chk:'Kontrol ediliyor...',pnm:'Port 4000',
  sL:'Dil',sD:'Veri Dizini',sP:'Port',sPr:'Proje',sNo:'Yok',sMo:'Varsayılan Model',sPe:'İzinler',
  f1:'AI Orkestrasyon',f2:'Otomatik Kuyruk',f3:'Otomatik Test',f4:'DAG Bağımlılıklar',f5:'Başarısız Tekrar',f6:'Webhook\'lar',
}};
function t(k){return T[lang]?.[k]||T.en[k]||k}

function applyT(){
  const m={'t-wd':'wd','t-ll':'ll','t-sc':'sc','t-sd':'sd','t-dt':'dt','t-dd':'dd','t-dl':'dl','t-dh':'dh','t-pl':'pl','t-br':'br','t-pt':'pt','t-pd':'pd','t-nl':'nl','t-wl':'wl','t-bp':'bp','t-sk':'sk','t-perm':'perm','t-permB':'permB','t-permD':'permD','t-queue':'queue','t-queueB':'queueB','t-queueD':'queueD','t-conc':'conc','t-gitS':'gitS','t-gitB':'gitB','t-gitD':'gitD','t-base':'base','t-prefs':'prefs','t-prefsD':'prefsD','t-defModel':'defModel','t-notif':'notif','t-notifD':'notifD','t-rt':'rt','t-rd':'rd','t-pnm':'pnm','f1':'f1','f2':'f2','f3':'f3','f4':'f4','f5':'f5','f6':'f6'};
  for(const[id,k]of Object.entries(m)){const e=document.getElementById(id);if(e)e.textContent=t(k)}
  updBtn();buildNav();
}
function setLang(l){lang=l;document.getElementById('le').classList.toggle('on',l==='en');document.getElementById('lt').classList.toggle('on',l==='tr');applyT()}

function buildNav(){const n=document.getElementById('snav');n.innerHTML='';for(let i=0;i<N;i++){const d=document.createElement('div');d.className='sn'+(i<cur?' done':i===cur?' on':'');n.appendChild(d)}}
function updBtn(){document.getElementById('nL').textContent=cur===N-1?t('fin'):t('nxt');document.getElementById('bB').style.visibility=cur===0?'hidden':'visible';document.getElementById('bB').textContent=t('bk')}

function go(s){
  const d=s>cur?'right':'left';document.getElementById('s'+cur).className='step '+(d==='right'?'left':'right');
  const ns=document.getElementById('s'+s);ns.className='step right';void ns.offsetWidth;ns.className='step active';
  cur=s;document.getElementById('pf').style.width=((s+1)/N*100)+'%';updBtn();buildNav();
  if(s===1)runChk();if(s===N-1)buildSum();
}
function next(){if(cur>=N-1){fin();return}go(cur+1)}
function prev(){if(cur>0)go(cur-1)}

function togCol(id){document.getElementById(id).classList.toggle('open')}
function togPerm(el){el.classList.toggle('on');autoPerm=el.classList.contains('on');document.getElementById('t-permB').textContent=autoPerm?t('permB'):'Manual'}
function togQ(el){el.classList.toggle('on');autoQ=el.classList.contains('on');document.getElementById('t-queueB').textContent=autoQ?'On':t('queueB')}
function togGit(el){el.classList.toggle('on');autoBr=el.classList.contains('on');document.getElementById('t-gitB').textContent=autoBr?t('gitB'):'Off'}
function setModel(m,el){defModel=m;document.querySelectorAll('#modelRow .lg').forEach(b=>b.classList.remove('on'));el.classList.add('on')}

async function runChk(){
  const p=parseInt(document.getElementById('portIn').value)||4000;
  ['claude','git','port','gh'].forEach(k=>{document.getElementById('i-'+k).className='ci ld';document.getElementById('i-'+k).innerHTML='';document.getElementById('d-'+k).textContent=t('chk');document.getElementById('c-'+k).className='ck';const f=document.querySelector('#c-'+k+' .fx');if(f)f.remove()});
  try{sys=await invoke('check_system',{port:p})}catch(e){sys={claude:false,git:false,port_available:true,gh:false,gh_authenticated:false}}
  setTimeout(()=>sc('claude',sys.claude,sys.claude?(sys.claude_version||t('cOk')):t('cBad'),sys.claude?null:t('cFx')),350);
  setTimeout(()=>sc('git',sys.git,sys.git?(sys.git_version||t('gOk')):t('gBad'),sys.git?null:t('gFx')),650);
  setTimeout(()=>sc('port',sys.port_available,sys.port_available?t('pOk'):t('pBad'),null),950);
  setTimeout(()=>{
    const ghOk=sys.gh&&sys.gh_authenticated;
    const ghDet=sys.gh?(sys.gh_authenticated?(sys.gh_version||t('ghOk')):t('ghNA')):t('ghNo');
    sc('gh',ghOk,ghDet,sys.gh?null:t('ghFx'));
    // gh is optional — don't block with fail state, use neutral style
    if(!ghOk){document.getElementById('c-gh').classList.remove('fail');document.getElementById('c-gh').classList.add('warn');document.getElementById('i-gh').className='ci opt';document.getElementById('i-gh').innerHTML='—'}
  },1250);
}
function sc(k,ok,det,fix){
  const i=document.getElementById('i-'+k);i.className='ci '+(ok?'ok':'bad');i.innerHTML=ok?'✓':'✗';i.style.animation=ok?'pop .35s ease':'shake .4s ease';
  document.getElementById('c-'+k).classList.add(ok?'pass':'fail');document.getElementById('d-'+k).textContent=det;
  if(fix){const d=document.createElement('div');d.className='fx';d.textContent='→ '+fix;document.querySelector('#c-'+k+' .cn').appendChild(d)}
}

async function brD(){try{const r=await invoke('browse_folder');if(r)document.getElementById('dataPath').value=r}catch(e){}}
async function brP(){try{const r=await invoke('browse_folder');if(r)document.getElementById('pDir').value=r}catch(e){}}

function buildSum(){
  const pn=document.getElementById('pName').value.trim();
  document.getElementById('sumBox').innerHTML=[
    {l:t('sL'),v:lang==='tr'?'🇹🇷 Türkçe':'🇬🇧 English'},
    {l:t('sD'),v:document.getElementById('dataPath').value||'—'},
    {l:t('sP'),v:document.getElementById('portIn').value||'4000'},
    {l:t('sPr'),v:pn||t('sNo')},
    {l:t('sMo'),v:defModel.charAt(0).toUpperCase()+defModel.slice(1)},
    {l:t('sPe'),v:autoPerm?'Auto-accept':'Manual'},
  ].map(i=>`<div class="si"><span class="sl">${i.l}</span><span class="sv">${i.v}</span></div>`).join('');
  boom();
}
function boom(){const el=document.getElementById('conf');el.innerHTML='';const c=['#DA7756','#e5936f','#22c55e','#f59e0b','#ef4444','#a855f7','#3b82f6'];for(let i=0;i<40;i++){const s=document.createElement('span');s.style.cssText=`left:${10+Math.random()*80}%;background:${c[i%c.length]};animation-delay:${Math.random()*.6}s;width:${3+Math.random()*6}px;height:${3+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'}`;el.appendChild(s)}setTimeout(()=>el.innerHTML='',3000)}

async function fin(){
  const b=document.getElementById('bN');b.disabled=true;document.getElementById('nL').textContent=t('su');
  try{
    await invoke('finish',{
      dataDir:document.getElementById('dataPath').value,
      port:parseInt(document.getElementById('portIn').value)||4000,
      language:lang,
      projectName:document.getElementById('pName').value.trim()||null,
      projectDir:document.getElementById('pDir').value.trim()||null,
    });
  }catch(e){console.error(e);b.disabled=false;document.getElementById('nL').textContent=t('fin')}
}
function quit(){invoke('quit')}

function initAmb(){const el=document.getElementById('amb');for(let i=0;i<10;i++){const p=document.createElement('i');p.style.cssText=`left:${Math.random()*100}%;top:${30+Math.random()*70}%;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;animation-delay:${Math.random()*12}s;animation-duration:${12+Math.random()*8}s`;el.appendChild(p)}}

document.addEventListener('DOMContentLoaded',async()=>{
  try{document.getElementById('dataPath').value=await invoke('get_default_dir')}catch(e){}
  initAmb();applyT();buildNav();
  setTimeout(()=>{const sp=document.getElementById('splash');if(sp){sp.classList.add('hide');setTimeout(()=>sp.remove(),500)}},400);
});
</script>
</body></html>
