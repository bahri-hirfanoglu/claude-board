<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" fill="none">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1000" y2="400"><stop offset="0%" stop-color="#1a1613"/><stop offset="100%" stop-color="#1f1b17"/></linearGradient>
    <linearGradient id="taccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8926E"/><stop offset="100%" stop-color="#C45A3C"/></linearGradient>
    <clipPath id="tround"><rect width="1000" height="400" rx="16"/></clipPath>
  </defs>

  <!-- Background (darkened overlay) -->
  <rect width="1000" height="400" rx="16" fill="url(#tbg)"/>
  <rect width="1000" height="400" rx="16" fill="black" fill-opacity="0.5" clip-path="url(#tround)"/>

  <!-- Faint board content behind overlay -->
  <!-- Column hints -->
  <rect x="20" y="20" width="228" height="380" rx="8" fill="#15120f" fill-opacity="0.3" clip-path="url(#tround)"/>
  <rect x="260" y="20" width="228" height="380" rx="8" fill="#15120f" fill-opacity="0.3" clip-path="url(#tround)"/>
  <rect x="752" y="20" width="228" height="380" rx="8" fill="#15120f" fill-opacity="0.3" clip-path="url(#tround)"/>

  <!-- ==================== Modal Card ==================== -->
  <rect x="200" y="10" width="600" height="380" rx="14" fill="#1f1b17" stroke="#3d372e" stroke-width="1"/>
  <!-- Subtle inner glow -->
  <rect x="201" y="11" width="598" height="378" rx="13" fill="none" stroke="#DA7756" stroke-width="0.3" stroke-opacity="0.2"/>

  <!-- ==================== Modal Header ==================== -->
  <text x="228" y="38" fill="#ebe4d8" font-size="14" font-weight="700" font-family="system-ui">New Task</text>
  <!-- Close button -->
  <rect x="752" y="18" width="28" height="28" rx="6" fill="#2a2520"/>
  <line x1="762" y1="28" x2="774" y2="40" stroke="#918678" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="774" y1="28" x2="762" y2="40" stroke="#918678" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Separator -->
  <rect x="218" y="50" width="564" height="1" fill="#3d372e"/>

  <!-- ==================== Title Input ==================== -->
  <text x="228" y="72" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">TITLE</text>
  <rect x="218" y="78" width="564" height="32" rx="6" fill="#15120f" stroke="#3d372e" stroke-width="0.5"/>
  <text x="230" y="98" fill="#ebe4d8" font-size="10" font-family="system-ui">Add user authentication</text>
  <!-- Cursor blink -->
  <line x1="362" y1="86" x2="362" y2="102" stroke="#DA7756" stroke-width="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </line>

  <!-- ==================== Description Textarea ==================== -->
  <text x="228" y="126" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">DESCRIPTION</text>
  <rect x="218" y="132" width="564" height="50" rx="6" fill="#15120f" stroke="#3d372e" stroke-width="0.5"/>
  <text x="230" y="150" fill="#ebe4d8" font-size="9" font-family="system-ui">Implement JWT-based auth with refresh tokens.</text>
  <text x="230" y="163" fill="#ebe4d8" font-size="9" font-family="system-ui">Include login, register, and password reset endpoints.</text>
  <text x="230" y="176" fill="#564d40" font-size="8" font-family="system-ui">Supports Markdown formatting</text>

  <!-- ==================== Type Selector Grid ==================== -->
  <text x="228" y="200" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">TYPE</text>
  <!-- feature (selected) -->
  <rect x="218" y="206" width="85" height="24" rx="5" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
  <text x="260.5" y="222" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="700" font-family="system-ui">feature</text>
  <!-- bugfix -->
  <rect x="311" y="206" width="85" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="353.5" y="222" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">bugfix</text>
  <!-- refactor -->
  <rect x="404" y="206" width="85" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="446.5" y="222" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">refactor</text>
  <!-- docs -->
  <rect x="497" y="206" width="85" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="539.5" y="222" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">docs</text>
  <!-- test -->
  <rect x="590" y="206" width="85" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="632.5" y="222" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">test</text>
  <!-- chore -->
  <rect x="683" y="206" width="85" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="725.5" y="222" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">chore</text>

  <!-- ==================== Model Selector ==================== -->
  <text x="228" y="252" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">MODEL</text>
  <!-- Haiku -->
  <rect x="218" y="258" width="120" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <circle cx="234" cy="270" r="4" fill="#22c55e" fill-opacity="0.3"/>
  <text x="246" y="274" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">Haiku</text>
  <text x="286" y="274" fill="#564d40" font-size="7" font-family="system-ui">Fast</text>
  <!-- Sonnet (selected) -->
  <rect x="346" y="258" width="120" height="24" rx="5" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="362" cy="270" r="4" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="374" y="274" fill="#60a5fa" font-size="8" font-weight="700" font-family="system-ui">Sonnet</text>
  <text x="422" y="274" fill="#3b82f6" fill-opacity="0.7" font-size="7" font-family="system-ui">Balanced</text>
  <!-- Opus -->
  <rect x="474" y="258" width="120" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <circle cx="490" cy="270" r="4" fill="#a78bfa" fill-opacity="0.3"/>
  <text x="502" y="274" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">Opus</text>
  <text x="538" y="274" fill="#564d40" font-size="7" font-family="system-ui">Powerful</text>

  <!-- ==================== Priority Selector ==================== -->
  <text x="228" y="302" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">PRIORITY</text>
  <!-- None -->
  <rect x="218" y="308" width="65" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="250.5" y="324" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">None</text>
  <!-- Low -->
  <rect x="291" y="308" width="65" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="323.5" y="324" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">Low</text>
  <!-- Medium -->
  <rect x="364" y="308" width="65" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="396.5" y="324" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">Medium</text>
  <!-- High -->
  <rect x="437" y="308" width="65" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="469.5" y="324" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">High</text>

  <!-- ==================== Effort Selector ==================== -->
  <text x="540" y="302" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">EFFORT</text>
  <!-- Low -->
  <rect x="540" y="308" width="65" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="572.5" y="324" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">Low</text>
  <!-- Medium (selected) -->
  <rect x="613" y="308" width="75" height="24" rx="5" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1"/>
  <text x="650.5" y="324" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="700" font-family="system-ui">Medium</text>
  <!-- High -->
  <rect x="696" y="308" width="65" height="24" rx="5" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="728.5" y="324" text-anchor="middle" fill="#918678" font-size="8" font-weight="600" font-family="system-ui">High</text>

  <!-- ==================== File Attachment Drop Zone ==================== -->
  <rect x="218" y="342" width="564" height="30" rx="6" fill="transparent" stroke="#3d372e" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="500" y="361" text-anchor="middle" fill="#564d40" font-size="8" font-family="system-ui">Drop files here or click to attach</text>

  <!-- ==================== Footer ==================== -->
  <rect x="218" y="378" width="564" height="1" fill="#3d372e"/>
  <!-- Cancel button -->
  <rect x="610" y="383" width="80" height="28" rx="6" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="650" y="401" text-anchor="middle" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">Cancel</text>
  <!-- Create Task button -->
  <rect x="700" y="383" width="100" height="28" rx="6" fill="url(#taccent)"/>
  <text x="750" y="401" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="system-ui">Create Task</text>
</svg>