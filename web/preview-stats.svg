<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" fill="none">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1000" y2="400"><stop offset="0%" stop-color="#1a1613"/><stop offset="100%" stop-color="#1f1b17"/></linearGradient>
    <linearGradient id="saccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8926E"/><stop offset="100%" stop-color="#C45A3C"/></linearGradient>
    <clipPath id="sround"><rect width="1000" height="400" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" rx="16" fill="url(#sbg)"/>
  <ellipse cx="500" cy="0" rx="500" ry="160" fill="#DA7756" fill-opacity="0.04" clip-path="url(#sround)"/>

  <!-- ==================== Header ==================== -->
  <text x="30" y="36" fill="#ebe4d8" font-size="16" font-weight="700" font-family="system-ui">Claude Usage</text>

  <!-- Time filter chips -->
  <rect x="820" y="18" width="36" height="24" rx="6" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="838" y="34" text-anchor="middle" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">7d</text>

  <rect x="864" y="18" width="36" height="24" rx="6" fill="#DA7756" fill-opacity="0.15" stroke="#DA7756" stroke-width="0.8"/>
  <text x="882" y="34" text-anchor="middle" fill="#DA7756" font-size="9" font-weight="700" font-family="system-ui">30d</text>

  <rect x="908" y="18" width="36" height="24" rx="6" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="926" y="34" text-anchor="middle" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">90d</text>

  <!-- Subtle divider -->
  <rect x="30" y="48" width="940" height="1" fill="#2a2520"/>

  <!-- ==================== Left: Bar Chart ==================== -->
  <rect x="20" y="58" width="580" height="270" rx="10" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="40" y="82" fill="#ebe4d8" font-size="11" font-weight="600" font-family="system-ui">Daily Token Usage</text>
  <text x="40" y="94" fill="#564d40" font-size="8" font-family="system-ui">Last 7 days</text>

  <!-- Y-axis labels -->
  <text x="40" y="120" fill="#564d40" font-size="7" font-family="system-ui">200K</text>
  <text x="40" y="155" fill="#564d40" font-size="7" font-family="system-ui">150K</text>
  <text x="40" y="190" fill="#564d40" font-size="7" font-family="system-ui">100K</text>
  <text x="40" y="225" fill="#564d40" font-size="7" font-family="system-ui">50K</text>
  <text x="40" y="260" fill="#564d40" font-size="7" font-family="system-ui">0</text>

  <!-- Grid lines -->
  <line x1="75" y1="116" x2="580" y2="116" stroke="#3d372e" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="75" y1="151" x2="580" y2="151" stroke="#3d372e" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="75" y1="186" x2="580" y2="186" stroke="#3d372e" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="75" y1="221" x2="580" y2="221" stroke="#3d372e" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="75" y1="256" x2="580" y2="256" stroke="#3d372e" stroke-width="0.5"/>

  <!-- Bars (7 days) -->
  <!-- Mon - 85K -->
  <rect x="95" y="197" width="52" height="59" rx="4" fill="#DA7756" fill-opacity="0.5"/>
  <text x="121" y="272" text-anchor="middle" fill="#564d40" font-size="7" font-family="system-ui">Mon</text>

  <!-- Tue - 120K -->
  <rect x="163" y="173" width="52" height="83" rx="4" fill="#DA7756" fill-opacity="0.5"/>
  <text x="189" y="272" text-anchor="middle" fill="#564d40" font-size="7" font-family="system-ui">Tue</text>

  <!-- Wed - 165K (highest) -->
  <rect x="231" y="142" width="52" height="114" rx="4" fill="#DA7756"/>
  <text x="257" y="137" text-anchor="middle" fill="#DA7756" font-size="7" font-weight="600" font-family="system-ui">165K</text>
  <text x="257" y="272" text-anchor="middle" fill="#ebe4d8" font-size="7" font-weight="600" font-family="system-ui">Wed</text>

  <!-- Thu - 95K -->
  <rect x="299" y="190" width="52" height="66" rx="4" fill="#DA7756" fill-opacity="0.5"/>
  <text x="325" y="272" text-anchor="middle" fill="#564d40" font-size="7" font-family="system-ui">Thu</text>

  <!-- Fri - 140K -->
  <rect x="367" y="159" width="52" height="97" rx="4" fill="#DA7756" fill-opacity="0.5"/>
  <text x="393" y="272" text-anchor="middle" fill="#564d40" font-size="7" font-family="system-ui">Fri</text>

  <!-- Sat - 45K -->
  <rect x="435" y="225" width="52" height="31" rx="4" fill="#DA7756" fill-opacity="0.35"/>
  <text x="461" y="272" text-anchor="middle" fill="#564d40" font-size="7" font-family="system-ui">Sat</text>

  <!-- Sun - 60K -->
  <rect x="503" y="215" width="52" height="41" rx="4" fill="#DA7756" fill-opacity="0.4"/>
  <text x="529" y="272" text-anchor="middle" fill="#564d40" font-size="7" font-family="system-ui">Sun</text>

  <!-- Total label -->
  <text x="40" y="310" fill="#918678" font-size="8" font-family="system-ui">Total this period:</text>
  <text x="130" y="310" fill="#ebe4d8" font-size="9" font-weight="700" font-family="system-ui">710K tokens</text>
  <text x="260" y="310" fill="#918678" font-size="8" font-family="system-ui">Avg/day:</text>
  <text x="310" y="310" fill="#ebe4d8" font-size="9" font-weight="700" font-family="system-ui">101K</text>

  <!-- ==================== Right Top: 2x2 Stat Cards ==================== -->
  <!-- Input Tokens -->
  <rect x="618" y="58" width="180" height="62" rx="8" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="632" y="78" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">Input Tokens</text>
  <text x="632" y="103" fill="#ebe4d8" font-size="20" font-weight="700" font-family="system-ui">845K</text>
  <rect x="766" y="68" width="22" height="22" rx="5" fill="#3b82f6" fill-opacity="0.12"/>
  <text x="777" y="83" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="system-ui">&#x2193;</text>

  <!-- Output Tokens -->
  <rect x="808" y="58" width="180" height="62" rx="8" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="822" y="78" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">Output Tokens</text>
  <text x="822" y="103" fill="#ebe4d8" font-size="20" font-weight="700" font-family="system-ui">312K</text>
  <rect x="956" y="68" width="22" height="22" rx="5" fill="#10b981" fill-opacity="0.12"/>
  <text x="967" y="83" text-anchor="middle" fill="#34d399" font-size="11" font-family="system-ui">&#x2191;</text>

  <!-- Cache Read -->
  <rect x="618" y="128" width="180" height="62" rx="8" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="632" y="148" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">Cache Read</text>
  <text x="632" y="173" fill="#ebe4d8" font-size="20" font-weight="700" font-family="system-ui">89K</text>
  <rect x="766" y="138" width="22" height="22" rx="5" fill="#a78bfa" fill-opacity="0.12"/>
  <text x="777" y="153" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="system-ui">&#x21BB;</text>

  <!-- Total Cost -->
  <rect x="808" y="128" width="180" height="62" rx="8" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="822" y="148" fill="#918678" font-size="9" font-weight="600" font-family="system-ui">Total Cost</text>
  <text x="822" y="173" fill="#DA7756" font-size="20" font-weight="700" font-family="system-ui">$18.40</text>
  <rect x="956" y="138" width="22" height="22" rx="5" fill="#DA7756" fill-opacity="0.12"/>
  <text x="967" y="153" text-anchor="middle" fill="#DA7756" font-size="11" font-family="system-ui">$</text>

  <!-- ==================== Right Bottom: Model Breakdown ==================== -->
  <rect x="618" y="200" width="370" height="128" rx="10" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="636" y="222" fill="#ebe4d8" font-size="11" font-weight="600" font-family="system-ui">Model Breakdown</text>

  <!-- Sonnet 65% -->
  <text x="636" y="248" fill="#918678" font-size="9" font-family="system-ui">Sonnet</text>
  <text x="946" y="248" text-anchor="end" fill="#ebe4d8" font-size="9" font-weight="600" font-family="system-ui">65%</text>
  <rect x="695" y="238" width="240" height="14" rx="4" fill="#15120f"/>
  <rect x="695" y="238" width="156" height="14" rx="4" fill="#3b82f6"/>

  <!-- Opus 25% -->
  <text x="636" y="274" fill="#918678" font-size="9" font-family="system-ui">Opus</text>
  <text x="946" y="274" text-anchor="end" fill="#ebe4d8" font-size="9" font-weight="600" font-family="system-ui">25%</text>
  <rect x="695" y="264" width="240" height="14" rx="4" fill="#15120f"/>
  <rect x="695" y="264" width="60" height="14" rx="4" fill="#a78bfa"/>

  <!-- Haiku 10% -->
  <text x="636" y="300" fill="#918678" font-size="9" font-family="system-ui">Haiku</text>
  <text x="946" y="300" text-anchor="end" fill="#ebe4d8" font-size="9" font-weight="600" font-family="system-ui">10%</text>
  <rect x="695" y="290" width="240" height="14" rx="4" fill="#15120f"/>
  <rect x="695" y="290" width="24" height="14" rx="4" fill="#22c55e"/>

  <!-- ==================== Bottom: Rate Limit Status ==================== -->
  <rect x="20" y="340" width="968" height="48" rx="10" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>

  <!-- Green status dot + text -->
  <circle cx="42" cy="364" r="5" fill="#22c55e" fill-opacity="0.2"/>
  <circle cx="42" cy="364" r="3" fill="#22c55e"/>
  <text x="56" y="360" fill="#ebe4d8" font-size="10" font-weight="600" font-family="system-ui">Rate Limit Status</text>
  <rect x="170" y="352" width="56" height="18" rx="4" fill="#22c55e" fill-opacity="0.1"/>
  <text x="198" y="364" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700" font-family="system-ui">Allowed</text>
  <text x="56" y="375" fill="#564d40" font-size="8" font-family="system-ui">All endpoints operational</text>

  <!-- Reset timer -->
  <text x="810" y="360" fill="#918678" font-size="9" font-family="system-ui">Next reset:</text>
  <rect x="870" y="351" width="100" height="20" rx="5" fill="#15120f" stroke="#3d372e" stroke-width="0.5"/>
  <text x="920" y="365" text-anchor="middle" fill="#ebe4d8" font-size="9" font-weight="600" font-family="system-ui">in 4h 22m</text>

  <!-- Usage bar -->
  <text x="400" y="360" fill="#918678" font-size="8" font-family="system-ui">Usage:</text>
  <rect x="436" y="354" width="200" height="8" rx="4" fill="#15120f"/>
  <rect x="436" y="354" width="72" height="8" rx="4" fill="#22c55e"/>
  <text x="442" y="375" fill="#564d40" font-size="7" font-family="system-ui">36% of limit used</text>
</svg>