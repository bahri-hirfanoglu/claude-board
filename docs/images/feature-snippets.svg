<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" fill="none">
  <defs>
    <linearGradient id="sn-bg" x1="0" y1="0" x2="900" y2="260"><stop offset="0%" stop-color="#1a1613"/><stop offset="100%" stop-color="#1f1b17"/></linearGradient>
  </defs>
  <rect width="900" height="260" rx="16" fill="url(#sn-bg)"/>

  <!-- Left: Snippet list -->
  <rect x="20" y="30" width="380" height="200" rx="12" fill="#2a2520" stroke="#3d372e" stroke-width="1"/>
  <text x="36" y="54" fill="#b5ab9a" font-size="10" font-weight="600" font-family="system-ui">CONTEXT SNIPPETS</text>
  <rect x="290" y="38" width="96" height="20" rx="6" fill="#DA7756" fill-opacity="0.1" stroke="#DA7756" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="338" y="51" text-anchor="middle" fill="#DA7756" font-size="8" font-weight="600" font-family="system-ui">+ New Snippet</text>

  <!-- Snippet 1: API Guidelines - enabled -->
  <rect x="36" y="68" width="348" height="50" rx="8" fill="#1f1b17" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Toggle ON -->
  <rect x="48" y="82" width="24" height="12" rx="6" fill="#10b981"/>
  <circle cx="66" cy="88" r="5" fill="#fff"/>
  <!-- Content -->
  <text x="82" y="86" fill="#ebe4d8" font-size="10" font-weight="600" font-family="system-ui">API Guidelines</text>
  <rect x="180" y="78" width="46" height="14" rx="3" fill="#10b981" fill-opacity="0.12"/>
  <text x="203" y="88" text-anchor="middle" fill="#10b981" font-size="7" font-weight="600" font-family="system-ui">enabled</text>
  <text x="82" y="104" fill="#736858" font-size="8" font-family="system-ui">REST API conventions, error handling, versioning rules</text>
  <!-- Token count -->
  <text x="350" y="88" fill="#736858" font-size="7" font-family="monospace" text-anchor="end">1.2k tokens</text>

  <!-- Snippet 2: Code Style - enabled -->
  <rect x="36" y="124" width="348" height="50" rx="8" fill="#1f1b17" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Toggle ON -->
  <rect x="48" y="138" width="24" height="12" rx="6" fill="#10b981"/>
  <circle cx="66" cy="144" r="5" fill="#fff"/>
  <!-- Content -->
  <text x="82" y="142" fill="#ebe4d8" font-size="10" font-weight="600" font-family="system-ui">Code Style</text>
  <rect x="158" y="134" width="46" height="14" rx="3" fill="#10b981" fill-opacity="0.12"/>
  <text x="181" y="144" text-anchor="middle" fill="#10b981" font-size="7" font-weight="600" font-family="system-ui">enabled</text>
  <text x="82" y="160" fill="#736858" font-size="8" font-family="system-ui">TypeScript strict mode, naming conventions, import order</text>
  <text x="350" y="144" fill="#736858" font-size="7" font-family="monospace" text-anchor="end">840 tokens</text>

  <!-- Snippet 3: Auth Rules - disabled -->
  <rect x="36" y="180" width="348" height="50" rx="8" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Toggle OFF -->
  <rect x="48" y="194" width="24" height="12" rx="6" fill="#3d372e"/>
  <circle cx="54" cy="200" r="5" fill="#736858"/>
  <!-- Content -->
  <text x="82" y="198" fill="#736858" font-size="10" font-weight="600" font-family="system-ui">Auth Rules</text>
  <rect x="154" y="190" width="50" height="14" rx="3" fill="#736858" fill-opacity="0.15"/>
  <text x="179" y="200" text-anchor="middle" fill="#736858" font-size="7" font-weight="600" font-family="system-ui">disabled</text>
  <text x="82" y="216" fill="#736858" font-size="8" font-family="system-ui" opacity="0.5">JWT validation, role-based access patterns</text>
  <text x="350" y="200" fill="#736858" font-size="7" font-family="monospace" text-anchor="end" opacity="0.5">560 tokens</text>

  <!-- Right: Template card expanded -->
  <rect x="420" y="30" width="460" height="200" rx="12" fill="#2a2520" stroke="#3d372e" stroke-width="1"/>
  <text x="436" y="54" fill="#b5ab9a" font-size="10" font-weight="600" font-family="system-ui">TASK TEMPLATE</text>

  <rect x="436" y="68" width="428" height="150" rx="8" fill="#1f1b17" stroke="#DA7756" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Template header -->
  <text x="450" y="90" fill="#ebe4d8" font-size="11" font-weight="600" font-family="system-ui">Feature Implementation</text>
  <!-- Badges row -->
  <rect x="450" y="100" width="48" height="16" rx="4" fill="#3b82f6" fill-opacity="0.12"/>
  <text x="474" y="111" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="600" font-family="system-ui">Sonnet</text>
  <rect x="504" y="100" width="48" height="16" rx="4" fill="#DA7756" fill-opacity="0.12"/>
  <text x="528" y="111" text-anchor="middle" fill="#DA7756" font-size="8" font-weight="600" font-family="system-ui">feature</text>
  <rect x="558" y="100" width="56" height="16" rx="4" fill="#10b981" fill-opacity="0.12"/>
  <text x="586" y="111" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600" font-family="system-ui">Git: auto</text>

  <!-- Template body with variables -->
  <text x="450" y="136" fill="#736858" font-size="9" font-family="system-ui">Implement a new feature for</text>
  <rect x="622" y="126" width="110" height="16" rx="3" fill="#DA7756" fill-opacity="0.1" stroke="#DA7756" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="628" y="137" fill="#DA7756" font-size="8" font-family="monospace">{{project_name}}</text>

  <text x="450" y="156" fill="#736858" font-size="9" font-family="system-ui">using</text>
  <rect x="474" y="146" width="86" height="16" rx="3" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="480" y="157" fill="#a78bfa" font-size="8" font-family="monospace">{{language}}</text>
  <text x="566" y="156" fill="#736858" font-size="9" font-family="system-ui">with proper error handling,</text>

  <text x="450" y="172" fill="#736858" font-size="9" font-family="system-ui">tests, and documentation. Follow the project coding standards.</text>

  <!-- Variable list at bottom -->
  <rect x="450" y="184" width="194" height="24" rx="4" fill="#2a2520"/>
  <text x="460" y="199" fill="#736858" font-size="7" font-weight="600" font-family="system-ui">VARIABLES:</text>
  <text x="516" y="199" fill="#DA7756" font-size="7" font-family="monospace">project_name</text>
  <text x="584" y="199" fill="#736858" font-size="7" font-family="system-ui">,</text>
  <text x="592" y="199" fill="#a78bfa" font-size="7" font-family="monospace">language</text>

  <!-- Snippets attached indicator -->
  <rect x="654" y="184" width="196" height="24" rx="4" fill="#2a2520"/>
  <text x="664" y="199" fill="#736858" font-size="7" font-weight="600" font-family="system-ui">SNIPPETS:</text>
  <circle cx="718" cy="196" r="3" fill="#10b981"/>
  <text x="726" y="199" fill="#10b981" font-size="7" font-family="system-ui">API Guidelines</text>
  <circle cx="802" cy="196" r="3" fill="#10b981"/>
  <text x="810" y="199" fill="#10b981" font-size="7" font-family="system-ui">Code Style</text>
</svg>