<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="900" y2="300"><stop offset="0%" stop-color="#1a1613"/><stop offset="100%" stop-color="#1f1b17"/></linearGradient>
  </defs>
  <rect width="900" height="300" rx="16" fill="url(#bg4)"/>
  <!-- Terminal window -->
  <rect x="20" y="20" width="860" height="260" rx="12" fill="#0f0d0b" stroke="#3d372e" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="20" y="20" width="860" height="32" rx="12" fill="#2a2520"/>
  <rect x="20" y="40" width="860" height="12" fill="#2a2520"/>
  <text x="36" y="40" fill="#ebe4d8" font-size="10" font-weight="600" font-family="system-ui">Live Terminal — User auth with JWT</text>
  <circle cx="834" cy="36" r="4" fill="#f59e0b"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <text x="810" y="40" fill="#f59e0b" font-size="8" font-family="system-ui" text-anchor="end">running</text>
  <!-- Turn separator -->
  <line x1="40" y1="68" x2="860" y2="68" stroke="#3d372e" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="440" y="65" text-anchor="middle" fill="#4b4538" font-size="8" font-family="system-ui"># Turn 1</text>
  <!-- Claude message -->
  <text x="40" y="88" fill="#b5ab9a" font-size="10" font-family="system-ui">I'll start by examining the current auth setup...</text>
  <!-- Tool: Read -->
  <rect x="40" y="100" width="820" height="30" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/>
  <text x="52" y="115" fill="#736858" font-size="8" font-family="monospace">14:32</text>
  <circle cx="96" cy="115" r="4" fill="#10b981"/><text x="96" y="118" text-anchor="middle" fill="white" font-size="6">✓</text>
  <text x="108" y="118" fill="#38bdf8" font-size="9" font-weight="600" font-family="system-ui">Read</text>
  <text x="142" y="118" fill="#736858" font-size="9" font-family="monospace">src/middleware/auth.ts</text>
  <text x="790" y="118" fill="#4b4538" font-size="8" font-family="monospace" text-anchor="end">42ms</text>
  <!-- Expanded content hint -->
  <rect x="40" y="134" width="820" height="22" rx="4" fill="#0f0d0b" stroke="#3d372e" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="52" y="149" fill="#4b4538" font-size="8" font-family="monospace">path: src/middleware/auth.ts  |  120 lines</text>
  <!-- Tool: Bash -->
  <rect x="40" y="162" width="820" height="30" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/>
  <text x="52" y="177" fill="#736858" font-size="8" font-family="monospace">14:32</text>
  <circle cx="96" cy="177" r="4" fill="#10b981"/><text x="96" y="180" text-anchor="middle" fill="white" font-size="6">✓</text>
  <text x="108" y="180" fill="#f59e0b" font-size="9" font-weight="600" font-family="system-ui">Bash</text>
  <text x="142" y="180" fill="#f59e0b" font-size="9" font-family="monospace">npm install jsonwebtoken bcrypt</text>
  <text x="790" y="180" fill="#4b4538" font-size="8" font-family="monospace" text-anchor="end">3.2s</text>
  <!-- Tool: Write -->
  <rect x="40" y="198" width="820" height="30" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/>
  <text x="52" y="213" fill="#736858" font-size="8" font-family="monospace">14:33</text>
  <circle cx="96" cy="213" r="4" fill="#10b981"/><text x="96" y="216" text-anchor="middle" fill="white" font-size="6">✓</text>
  <text x="108" y="216" fill="#10b981" font-size="9" font-weight="600" font-family="system-ui">Write</text>
  <text x="145" y="216" fill="#736858" font-size="9" font-family="monospace">src/auth/jwt.ts</text>
  <text x="790" y="216" fill="#4b4538" font-size="8" font-family="monospace" text-anchor="end">15ms</text>
  <!-- Tool: Edit (running) -->
  <rect x="40" y="234" width="820" height="30" rx="6" fill="#f59e0b" fill-opacity="0.05" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="52" y="249" fill="#736858" font-size="8" font-family="monospace">14:33</text>
  <circle cx="96" cy="249" r="4" fill="#f59e0b"><animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/></circle>
  <text x="108" y="252" fill="#eab308" font-size="9" font-weight="600" font-family="system-ui">Edit</text>
  <text x="138" y="252" fill="#736858" font-size="9" font-family="monospace">src/routes/auth.ts</text>
  <text x="790" y="252" fill="#f59e0b" font-size="8" font-family="system-ui" text-anchor="end">running...</text>
</svg>
