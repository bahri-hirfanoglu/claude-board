    <circle cx="6" cy="6" r="5" fill="none" stroke="#DA7756" stroke-width="1.5"/>
    <line x1="10" y1="8" x2="18" y2="16" stroke="#DA7756" stroke-width="1.5" stroke-linecap="round"/>
