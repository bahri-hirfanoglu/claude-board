  <text x="460" y="249" font-family="system-ui" font-size="11" fill="#b5ab9a">+</text>
  <text x="473" y="249" font-family="monospace" font-size="11" fill="#DA7756">project key</text>
  <text x="555" y="249" font-family="system-ui" font-size="11" fill="#b5ab9a">+</text>
