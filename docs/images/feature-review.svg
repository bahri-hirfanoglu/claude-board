<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="rv-bg" x1="0" y1="0" x2="900" y2="320"><stop offset="0%" stop-color="#1a1613"/><stop offset="100%" stop-color="#1f1b17"/></linearGradient>
  </defs>
  <rect width="900" height="320" rx="16" fill="url(#rv-bg)"/>

  <!-- Step labels -->
  <rect x="30" y="10" width="14" height="14" rx="7" fill="#DA7756"/><text x="37" y="20" text-anchor="middle" fill="#1a1613" font-size="8" font-weight="700" font-family="system-ui">1</text>
  <text x="50" y="20" fill="#DA7756" font-size="9" font-weight="600" font-family="system-ui">Task in Testing</text>
  <rect x="290" y="10" width="14" height="14" rx="7" fill="#DA7756"/><text x="297" y="20" text-anchor="middle" fill="#1a1613" font-size="8" font-weight="700" font-family="system-ui">2</text>
  <text x="310" y="20" fill="#DA7756" font-size="9" font-weight="600" font-family="system-ui">Review Changes</text>
  <rect x="610" y="10" width="14" height="14" rx="7" fill="#DA7756"/><text x="617" y="20" text-anchor="middle" fill="#1a1613" font-size="8" font-weight="700" font-family="system-ui">3</text>
  <text x="630" y="20" fill="#DA7756" font-size="9" font-weight="600" font-family="system-ui">Decision</text>

  <!-- Step 1: Task card in Testing -->
  <rect x="20" y="34" width="240" height="270" rx="12" fill="#2a2520" stroke="#DA7756" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="36" y="48" width="208" height="80" rx="8" fill="#1f1b17" stroke="#DA7756" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="46" y="58" width="36" height="14" rx="3" fill="#3b82f6" fill-opacity="0.15"/>
  <text x="64" y="68" text-anchor="middle" fill="#60a5fa" font-size="7" font-weight="600" font-family="system-ui">feature</text>
  <rect x="88" y="58" width="52" height="14" rx="3" fill="#DA7756" fill-opacity="0.15"/>
  <text x="114" y="68" text-anchor="middle" fill="#DA7756" font-size="7" font-weight="600" font-family="system-ui">Testing</text>
  <text x="46" y="92" fill="#ebe4d8" font-size="10" font-weight="600" font-family="system-ui">Refactor auth module</text>
  <text x="46" y="108" fill="#736858" font-size="8" font-family="system-ui">Assigned to Claude</text>
  <!-- Claude status indicator -->
  <rect x="36" y="138" width="208" height="34" rx="6" fill="#DA7756" fill-opacity="0.06" stroke="#DA7756" stroke-width="0.5" stroke-opacity="0.2"/>
  <circle cx="50" cy="155" r="4" fill="#DA7756"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <text x="60" y="152" fill="#DA7756" font-size="8" font-weight="600" font-family="system-ui">Claude finished</text>
  <text x="60" y="164" fill="#736858" font-size="7" font-family="system-ui">Awaiting human review</text>

  <!-- Terminal output preview -->
  <rect x="36" y="182" width="208" height="56" rx="6" fill="#0d0c0a" stroke="#3d372e" stroke-width="0.5"/>
  <text x="46" y="196" fill="#10b981" font-size="7" font-family="monospace">$ claude --task refactor-auth</text>
  <text x="46" y="208" fill="#736858" font-size="7" font-family="monospace">Refactored 4 files...</text>
  <text x="46" y="220" fill="#736858" font-size="7" font-family="monospace">All tests passing (12/12)</text>
  <text x="46" y="232" fill="#10b981" font-size="7" font-family="monospace">Done in 45s | 8.2k tokens</text>

  <!-- Review button -->
  <rect x="36" y="248" width="208" height="28" rx="6" fill="#DA7756" fill-opacity="0.15" stroke="#DA7756" stroke-width="0.5"/>
  <text x="140" y="266" text-anchor="middle" fill="#DA7756" font-size="9" font-weight="600" font-family="system-ui">Review Changes</text>

  <!-- Arrow 1→2 -->
  <line x1="270" y1="170" x2="295" y2="170" stroke="#DA7756" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="293,165 301,170 293,175" fill="#DA7756"/>

  <!-- Step 2: Review panel -->
  <rect x="305" y="34" width="280" height="270" rx="12" fill="#2a2520" stroke="#3d372e" stroke-width="1"/>

  <!-- Diff stats -->
  <rect x="321" y="48" width="248" height="36" rx="8" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/>
  <text x="333" y="64" fill="#ebe4d8" font-size="9" font-weight="600" font-family="system-ui">Changes</text>
  <text x="333" y="78" fill="#10b981" font-size="10" font-weight="700" font-family="monospace">+42</text>
  <text x="360" y="78" fill="#ef4444" font-size="10" font-weight="700" font-family="monospace">-8</text>
  <text x="386" y="78" fill="#736858" font-size="8" font-family="system-ui">across 4 files</text>

  <!-- Commit list -->
  <text x="321" y="102" fill="#b5ab9a" font-size="8" font-weight="600" font-family="system-ui">COMMITS</text>
  <rect x="321" y="110" width="248" height="70" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/>
  <!-- Commit 1 -->
  <circle cx="335" cy="126" r="3" fill="#3b82f6"/>
  <text x="344" y="129" fill="#60a5fa" font-size="7" font-family="monospace">a3f1b2c</text>
  <text x="396" y="129" fill="#ebe4d8" font-size="8" font-family="system-ui">Extract auth service</text>
  <!-- Commit 2 -->
  <circle cx="335" cy="144" r="3" fill="#3b82f6"/>
  <text x="344" y="147" fill="#60a5fa" font-size="7" font-family="monospace">e7d4a9f</text>
  <text x="396" y="147" fill="#ebe4d8" font-size="8" font-family="system-ui">Add token refresh logic</text>
  <!-- Commit 3 -->
  <circle cx="335" cy="162" r="3" fill="#3b82f6"/>
  <text x="344" y="165" fill="#60a5fa" font-size="7" font-family="monospace">c2b8e1d</text>
  <text x="396" y="165" fill="#ebe4d8" font-size="8" font-family="system-ui">Update tests</text>
  <!-- Commit line connecting dots -->
  <line x1="335" y1="129" x2="335" y2="141" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="335" y1="147" x2="335" y2="159" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Diff preview -->
  <text x="321" y="198" fill="#b5ab9a" font-size="8" font-weight="600" font-family="system-ui">DIFF PREVIEW</text>
  <rect x="321" y="206" width="248" height="48" rx="6" fill="#0d0c0a" stroke="#3d372e" stroke-width="0.5"/>
  <text x="333" y="220" fill="#ef4444" font-size="7" font-family="monospace">- const token = getToken();</text>
  <text x="333" y="232" fill="#10b981" font-size="7" font-family="monospace">+ const token = await authService</text>
  <text x="333" y="244" fill="#10b981" font-size="7" font-family="monospace">+   .refreshToken(userId);</text>

  <!-- Action buttons -->
  <rect x="321" y="264" width="120" height="28" rx="6" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
  <text x="381" y="282" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600" font-family="system-ui">Approve</text>
  <rect x="449" y="264" width="120" height="28" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="509" y="282" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600" font-family="system-ui">Request Changes</text>

  <!-- Arrow 2→3 (splits into two paths) -->
  <line x1="595" y1="170" x2="620" y2="170" stroke="#DA7756" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="618,165 626,170 618,175" fill="#DA7756"/>

  <!-- Step 3: Two paths -->
  <rect x="635" y="34" width="245" height="270" rx="12" fill="#2a2520" stroke="#3d372e" stroke-width="1"/>

  <!-- Path A: Approve → Done (top) -->
  <rect x="651" y="48" width="213" height="90" rx="8" fill="#10b981" fill-opacity="0.04" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="667" y="66" fill="#10b981" font-size="9" font-weight="700" font-family="system-ui">APPROVE PATH</text>

  <!-- Approve badge -->
  <rect x="667" y="76" width="60" height="20" rx="4" fill="#10b981" fill-opacity="0.15"/>
  <text x="697" y="90" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600" font-family="system-ui">Approve</text>
  <!-- Arrow -->
  <line x1="735" y1="86" x2="758" y2="86" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="756,82 762,86 756,90" fill="#10b981"/>
  <!-- Done card -->
  <rect x="766" y="76" width="86" height="20" rx="4" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
  <circle cx="778" cy="86" r="4" fill="#10b981"/>
  <text x="788" y="90" fill="#10b981" font-size="8" font-weight="600" font-family="system-ui">Done</text>

  <text x="667" y="118" fill="#736858" font-size="7" font-family="system-ui">Task moves to Done column. PR merged.</text>
  <text x="667" y="130" fill="#736858" font-size="7" font-family="system-ui">Webhooks fire for completion event.</text>

  <!-- Divider -->
  <line x1="651" y1="152" x2="864" y2="152" stroke="#3d372e" stroke-width="0.5" stroke-dasharray="4,4"/>
  <rect x="734" y="146" width="32" height="12" rx="6" fill="#2a2520" stroke="#3d372e" stroke-width="0.5"/>
  <text x="750" y="155" text-anchor="middle" fill="#736858" font-size="7" font-weight="600" font-family="system-ui">OR</text>

  <!-- Path B: Request Changes → feedback → back to In Progress -->
  <rect x="651" y="166" width="213" height="128" rx="8" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="667" y="184" fill="#f59e0b" font-size="9" font-weight="700" font-family="system-ui">REQUEST CHANGES PATH</text>

  <!-- Request Changes badge -->
  <rect x="667" y="194" width="90" height="18" rx="4" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="712" y="206" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="600" font-family="system-ui">Request Changes</text>

  <!-- Feedback textarea mockup -->
  <rect x="667" y="218" width="185" height="38" rx="4" fill="#0d0c0a" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="677" y="232" fill="#f59e0b" font-size="7" font-family="system-ui">Feedback:</text>
  <text x="677" y="244" fill="#736858" font-size="7" font-family="monospace" font-style="italic">Handle edge case for expired tokens</text>

  <!-- Arrow back to In Progress -->
  <rect x="667" y="264" width="185" height="20" rx="4" fill="#f59e0b" fill-opacity="0.08"/>
  <!-- Curved return arrow icon -->
  <path d="M677,274 L687,274 L683,270 M687,274 L683,278" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round"/>
  <text x="694" y="278" fill="#f59e0b" font-size="8" font-weight="600" font-family="system-ui">Back to In Progress</text>
  <text x="808" y="278" fill="#736858" font-size="7" font-family="system-ui">with feedback</text>
</svg>