  <rect x="520" y="20" width="200" height="280" rx="12" fill="#2a2520" stroke="#DA7756" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="540" cy="44" r="12" fill="#f59e0b" fill-opacity="0.3"/><text x="540" y="48" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">3</text>
  <text x="560" y="48" fill="#ebe4d8" font-size="12" font-weight="600" font-family="system-ui">Review Proposals</text>
  <!-- Task cards -->
  <rect x="532" y="64" width="176" height="38" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="1"/>
  <rect x="540" y="72" width="36" height="14" rx="3" fill="#3b82f6" fill-opacity="0.15"/><text x="558" y="82" text-anchor="middle" fill="#60a5fa" font-size="7" font-weight="600" font-family="system-ui">feature</text>
  <text x="582" y="82" fill="#ebe4d8" font-size="9" font-family="system-ui">JWT auth middleware</text>
  <text x="700" y="82" fill="#ef4444" font-size="10" font-family="system-ui">×</text>
  <rect x="532" y="108" width="176" height="38" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="1"/>
  <rect x="540" y="116" width="36" height="14" rx="3" fill="#3b82f6" fill-opacity="0.15"/><text x="558" y="126" text-anchor="middle" fill="#60a5fa" font-size="7" font-weight="600" font-family="system-ui">feature</text>
  <text x="582" y="126" fill="#ebe4d8" font-size="9" font-family="system-ui">Login/register endpoints</text>
  <rect x="532" y="152" width="176" height="38" rx="6" fill="#1f1b17" stroke="#3d372e" stroke-width="1"/>
  <rect x="540" y="160" width="26" height="14" rx="3" fill="#f59e0b" fill-opacity="0.15"/><text x="553" y="170" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="600" font-family="system-ui">test</text>
  <text x="572" y="170" fill="#ebe4d8" font-size="9" font-family="system-ui">Auth test suite</text>
  <!-- Buttons -->
  <rect x="532" y="210" width="80" height="30" rx="6" fill="#2a2520" stroke="#3d372e" stroke-width="1"/>
  <text x="572" y="229" text-anchor="middle" fill="#b5ab9a" font-size="10" font-family="system-ui">↻ Revise</text>
  <rect x="620" y="210" width="88" height="30" rx="6" fill="#10b981"/>
  <text x="664" y="229" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="system-ui">✓ Approve</text>
  <!-- Arrow -->
  <path d="M730 160 L750 160" stroke="#DA7756" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="750,155 760,160 750,165" fill="#DA7756"/>
  <!-- Step 4: Board -->
  <rect x="770" y="20" width="110" height="280" rx="12" fill="#2a2520" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="790" cy="44" r="12" fill="#10b981" fill-opacity="0.3"/><text x="790" y="48" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold">4</text>
  <text x="810" y="48" fill="#ebe4d8" font-size="12" font-weight="600" font-family="system-ui">Board</text>
  <!-- Mini kanban -->
  <rect x="782" y="64" width="86" height="16" rx="3" fill="#f59e0b" fill-opacity="0.1"/><text x="825" y="75" text-anchor="middle" fill="#f59e0b" font-size="7" font-family="system-ui">BACKLOG</text>
  <rect x="782" y="84" width="86" height="20" rx="4" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/><text x="790" y="97" fill="#b5ab9a" font-size="7" font-family="system-ui">JWT middleware</text>
  <rect x="782" y="108" width="86" height="20" rx="4" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/><text x="790" y="121" fill="#b5ab9a" font-size="7" font-family="system-ui">Login endpoints</text>
  <rect x="782" y="132" width="86" height="20" rx="4" fill="#1f1b17" stroke="#3d372e" stroke-width="0.5"/><text x="790" y="145" fill="#b5ab9a" font-size="7" font-family="system-ui">Auth tests</text>
