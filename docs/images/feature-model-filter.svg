  <text x="612" y="116" font-family="monospace" font-size="11" font-weight="600" fill="#b5ab9a">REF-CB-1003</text>
  <text x="612" y="136" font-family="system-ui" font-size="12" font-weight="500" fill="#ebe4d8">Refactor auth module</text>
