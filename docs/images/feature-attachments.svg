<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" fill="none">
  <defs>
    <clipPath id="roundedBg">
      <rect width="900" height="260" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="12" fill="#1a1613"/>

  <!-- Left panel: Task creation modal snippet -->
  <rect x="24" y="20" width="400" height="220" rx="10" fill="#2a2520" stroke="#3d372e" stroke-width="1.5"/>

  <!-- Modal header -->
  <text x="44" y="48" font-family="system-ui" font-size="13" font-weight="600" fill="#ebe4d8">Attachments</text>
  <line x1="24" y1="60" x2="424" y2="60" stroke="#3d372e" stroke-width="1"/>

  <!-- File drop zone -->
  <rect x="44" y="76" width="360" height="148" rx="10" fill="none" stroke="#736858" stroke-width="2" stroke-dasharray="8 5"/>

  <!-- Cloud upload icon -->
  <g transform="translate(200, 108)">
    <!-- Cloud body -->
    <path d="M12 4C7.6 4 4 7.1 4 11c0 .5.1 1 .2 1.5C1.7 13.4 0 15.7 0 18.4 0 21.5 2.5 24 5.6 24h20.8c2.5 0 4.6-2 4.6-4.6 0-2.2-1.6-4.1-3.7-4.5C27 10.5 23.2 7.2 18.8 7.2c-1 0-2 .2-2.8.5C15 5.4 13.6 4 12 4z" fill="none" stroke="#DA7756" stroke-width="1.8"/>
    <!-- Upload arrow -->
    <path d="M15.5 20v-7M12 16.5l3.5-3.5 3.5 3.5" fill="none" stroke="#DA7756" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="224" y="152" font-family="system-ui" font-size="13" font-weight="500" fill="#ebe4d8" text-anchor="middle">Drop files here</text>
  <text x="224" y="172" font-family="system-ui" font-size="11" fill="#736858" text-anchor="middle">or click to browse</text>

  <!-- Supported formats -->
  <text x="224" y="200" font-family="system-ui" font-size="10" fill="#736858" text-anchor="middle">Supports images, documents, code files up to 10 MB</text>

  <!-- Right panel: Attached files list -->
  <rect x="448" y="20" width="428" height="220" rx="10" fill="#2a2520" stroke="#3d372e" stroke-width="1.5"/>

  <!-- Header -->
  <text x="468" y="48" font-family="system-ui" font-size="13" font-weight="600" fill="#ebe4d8">Attached Files</text>
  <rect x="578" y="35" width="22" height="18" rx="9" fill="#3d372e"/>
  <text x="589" y="48" font-family="system-ui" font-size="10" font-weight="600" fill="#b5ab9a" text-anchor="middle">3</text>
  <line x1="448" y1="60" x2="876" y2="60" stroke="#3d372e" stroke-width="1"/>

  <!-- File 1: schema.sql -->
  <rect x="462" y="72" width="400" height="44" rx="8" fill="#1a1613" stroke="#3d372e" stroke-width="1"/>
  <!-- SQL file icon -->
  <rect x="476" y="80" width="28" height="28" rx="4" fill="#2a4a3a"/>
  <text x="490" y="99" font-family="monospace" font-size="8" font-weight="700" fill="#4ade80" text-anchor="middle">SQL</text>
  <!-- File info -->
  <text x="516" y="93" font-family="system-ui" font-size="12" font-weight="500" fill="#ebe4d8">schema.sql</text>
  <text x="516" y="108" font-family="system-ui" font-size="10" fill="#736858">12 KB</text>
  <!-- Delete button -->
  <g transform="translate(836, 86)">
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#3d372e"/>
    <line x1="6" y1="6" x2="14" y2="14" stroke="#b5ab9a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="6" x2="6" y2="14" stroke="#b5ab9a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- File 2: mockup.png -->
  <rect x="462" y="124" width="400" height="44" rx="8" fill="#1a1613" stroke="#3d372e" stroke-width="1"/>
  <!-- Image file icon -->
  <rect x="476" y="132" width="28" height="28" rx="4" fill="#3a2a4a"/>
  <text x="490" y="151" font-family="monospace" font-size="8" font-weight="700" fill="#c084fc" text-anchor="middle">PNG</text>
  <!-- File info -->
  <text x="516" y="145" font-family="system-ui" font-size="12" font-weight="500" fill="#ebe4d8">mockup.png</text>
  <text x="516" y="160" font-family="system-ui" font-size="10" fill="#736858">340 KB</text>
  <!-- Delete button -->
  <g transform="translate(836, 138)">
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#3d372e"/>
    <line x1="6" y1="6" x2="14" y2="14" stroke="#b5ab9a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="6" x2="6" y2="14" stroke="#b5ab9a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- File 3: spec.md -->
  <rect x="462" y="176" width="400" height="44" rx="8" fill="#1a1613" stroke="#3d372e" stroke-width="1"/>
  <!-- Markdown file icon -->
  <rect x="476" y="184" width="28" height="28" rx="4" fill="#2a3a4a"/>
  <text x="490" y="203" font-family="monospace" font-size="8" font-weight="700" fill="#60a5fa" text-anchor="middle">MD</text>
  <!-- File info -->
  <text x="516" y="197" font-family="system-ui" font-size="12" font-weight="500" fill="#ebe4d8">spec.md</text>
  <text x="516" y="212" font-family="system-ui" font-size="10" fill="#736858">8 KB</text>
  <!-- Delete button -->
  <g transform="translate(836, 190)">
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#3d372e"/>
    <line x1="6" y1="6" x2="14" y2="14" stroke="#b5ab9a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="6" x2="6" y2="14" stroke="#b5ab9a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>